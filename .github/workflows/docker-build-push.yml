name: Docker build and push workflow

on:
#  push:
#    branches:
#      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image for the frontend
        run: docker build --file apps/frontend/Dockerfile --tag athlon1600/chat-frontend:latest .

      - name: Push Docker image
        run: docker push athlon1600/chat-frontend:latest